<div class="room-images">
  @if (mainImage()) {
    <img [src]="mainImage()" alt="Room Image" class="main-image rounded mb-3" style="width: 100%; height: 350px; object-fit: cover;">
  } @else {
    <div class="text-center py-5 bg-light rounded">
      <p class="text-muted mb-0">No images available</p>
    </div>
  }

  @if (imagesList.length > 0) {
    <div class="d-flex flex-wrap gap-2">
      @for (img of imagesList; track img.id) {
        <div class="position-relative">
          <img 
            [src]="img.url" 
            alt="Room Image" 
            class="rounded"
            style="width: 80px; height: 80px; object-fit: cover; cursor: pointer; border: 3px solid;"
            [style.border-color]="mainImage() === img.url ? '#0d6efd' : '#dee2e6'"
            (click)="selectImage(img.url)"
          >
          <button 
            class="btn btn-danger btn-sm position-absolute top-0 end-0 rounded-circle" 
            style="width: 24px; height: 24px; padding: 0; font-size: 12px; line-height: 1;"
            (click)="delete(img.id)"
          >×</button>
        </div>
      }
    </div>
  }
</div>
