<div class="hotel-direct-payment-container">
  <h3>🏨 Hotel Direct Payment</h3>
  
  <div class="amount-display">
    <span class="label">Amount:</span>
    <span class="amount">${{ amount }}</span>
  </div>

  <div class="payment-form">
    <div class="form-group">
      <label>Card Number</label>
      <input 
        type="text" 
        class="form-control" 
        placeholder="1234 5678 9012 3456" 
        maxlength="19"
        [ngModel]="cardNumber()"
        (input)="formatCardNumber($event)"
      >
      @if(cardNumber() && !isValidCardNumber()) {
        <small class="error-text">Invalid card number</small>
      }
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>Expiry Date</label>
        <input 
          type="text" 
          class="form-control" 
          placeholder="MM/YY" 
          maxlength="5"
          [ngModel]="expiryDate()"
          (input)="formatExpiry($event)"
        >
      </div>
      <div class="form-group">
        <label>CVV</label>
        <input 
          type="text" 
          class="form-control" 
          placeholder="123" 
          maxlength="4"
          [ngModel]="cvv()"
          (input)="formatCvv($event)"
        >
      </div>
    </div>
    
    <div class="form-group">
      <label>Cardholder Name</label>
      <input 
        type="text" 
        class="form-control" 
        placeholder="John Doe"
        [ngModel]="cardHolderName()"
        (ngModelChange)="cardHolderName.set($event)"
      >
    </div>
  </div>

  @if(error()) {
    <div class="alert alert-warning">
      {{ error() }}
    </div>
  }

  @if(paid()) {
    <div class="success-message">
      ✅ Payment successful!
    </div>
  } @else {
    <button 
      class="pay-btn"
      (click)="handlePayment()"
      [disabled]="loading() || !isValidCardNumber() || !isValidExpiry() || !isValidCvv() || !isValidCardholderName()"
    >
      @if(loading()) {
        Processing...
      } @else {
        💰 Pay ${{ amount }}
      }
    </button>
  }

  <div class="payment-actions">
    <button class="btn btn-secondary" (click)="onCancel()">
      Cancel
    </button>
  </div>
</div>
